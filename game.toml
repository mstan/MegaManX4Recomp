[game]
name = "Mega Man X4"
id = "SLUS-00561"
exe = "mmx4/SLUS_005.61"
disc = "mmx4/Mega Man X4.cue"
load_address = "0x80010000"
entry_pc = "0x800DAE8C"
text_size = "0x0011F800"
stack_base = "0x801FFFF0"

[recompiler]
seeds = "seeds/ghidra_funcs.txt"
out_dir = "generated"
strict = true

[runtime]
debug_port = 4525
window_title = "MegaManX4Recomp"
memcard_dir = "saves"
# Disc speed + fast loads — the architecturally-correct model (see MMX6 game.toml
# for the full rationale). Keep AUTHENTIC guest CD timing (disc_speed="1x") so
# nothing breaks, and get fast loads by fast-forwarding the whole guest timeline
# during loads (turbo_loads). Speeding the guest-visible CD device is unsafe for
# timing-sensitive Psy-Q titles like the Mega Man X engine.
disc_speed   = "1x"     # authentic guest CD timing (never breaks game timing)
turbo_loads  = true     # fast-forward the machine during CD loads (the real speed lever)
# HLE BIOS tier, DEFAULT-ON for X4 (mirrors X5/X6): kernel B0 event family served
# host-side + the boot shell-skip — boots straight past the PSX logo into the
# game (kernel init still runs the real recompiled BIOS; unimplemented services
# fall through to LLE). Set false (or PSX_BIOS_HLE=0) to compare against the
# authentic LLE boot.
bios_hle = true
# Overlay acceleration: compile dirty-RAM overlays (X4 streams its stage/engine
# code from ARC archives — CAPCOM.ARC / COLxx_*.ARC — into RAM and executes it;
# the overlay cache captures those dirty-RAM regions generically, same pipeline
# as MMX6's ROCK overlay). Captures -> compile_overlays.py -> DLLs in
# <exe>/cache/SLUS-00561/ -> loader rescans + loads. Priority: static > gcc shard
# > tcc shard > interp. backend "auto" = gcc if a gcc toolchain is present, else
# the bundled toolchain-free tcc.
overlay_cache = true
overlay_backend = "auto"
# Compile RECIPE only (compiler + tool paths). The WRITE cache + READ captures are
# injected by the runtime (PSX_OVERLAY_CACHE_DIR / PSX_OVERLAY_CAPTURES) so they
# can never drift from the loader's canonical <exe>/cache + <exe>/overlay_captures.json.
overlay_autocompile_cmd = "python ../psxrecomp/tools/compile_overlays.py --game-toml game.toml --recompiler ../psxrecomp/recompiler/build/psxrecomp-game.exe --runtime-include ../psxrecomp/runtime/include --gcc C:/msys64/mingw64/bin/gcc.exe --cps"

[video]
# Native presentation. X4 defaults to authentic 4:3. The launcher's experimental
# widescreen toggle opts into the true 16:9 field of view configured below by
# writing "16:9" to settings.toml; it remains off by default.
aspect_ratio = "4:3"

# auto_skip_fmv: auto-skip full-motion videos (XA audio + MDEC). Off for the
# initial bring-up baseline; enabled during the enhancement-porting phase once the
# X4 MDEC player loop is understood (X4 ships STR/CAPCOM20.STR + per-stage OP/X/Z
# opening movies).
auto_skip_fmv = false

# Widescreen is offered as an experimental opt-in and still defaults to 4:3.
# full_2d enables native-wide presentation; the hooks below widen the scene.
# The game remains native 4:3 unless the player selects the launcher toggle.
# The hook path is the same pure-2D native-wide mechanism proven by MMX6.
# All runtime helpers are identity at 4:3; codegen hooks require regeneration.
[widescreen]
offer   = true
full_2d = true

# X4 builds the player health/weapon HUD and the right-side enemy/boss health
# HUD in a dedicated double-buffered GP0 packet arena. Re-anchor only commands
# from that arena: left-third pieces move to the true 16:9 left edge and
# right-third pieces move to the true 16:9 right edge. Filtering is essential
# because X4's world is also made of screen-space 2D primitives.
nw_hud_corners   = true
nw_hud_source_lo = "0x80139800"
nw_hud_source_hi = "0x8013a000"

# Widen screen-derived object visibility funnels when they occur in statically
# recompiled code or streamed overlays. The detector requires paired horizontal
# and vertical bounds, so unrelated uses of 320 are untouched. The runtime
# margin is zero at 4:3 and the per-side 16:9 reveal width when enabled.
[widescreen.cull]
auto_screen_x = true
screen_h_imms = ["0xf0"] # X4 render funnel uses the full 240-line display bound
bias_sites = [
  "0x8002b17c", "0x8002b1bc", # fixed 64px despawn/classifier margin
  "0x8002b2a8", "0x8002b2e8", # fixed 32px activation/draw margin
  "0x8002b3e0", "0x8002b420", # fixed 96px activation/draw margin
]
range_sites = [
  "0x8002b1c4", # 320 + 2*64
  "0x8002b2f0", # 320 + 2*32
  "0x8002b428", # 320 + 2*96
]
a1_sites = [
  "0x8002b1ec", # load-delay nop before copying caller horizontal margin
  "0x8002b320", # move t0,a1 in the flag-setting classifier variant
]

# X4's three-layer background renderer at 0x80026AA0 draws 21 columns x 16 rows
# from a 32-column ring. This is the X4/X5 inline-sltiu variant of the MMX6
# mechanism: widen the loop bound, move its tile/screen start left, and stream
# both leading edges far enough out to keep reveal columns populated.
[widescreen.bg2d]
count_site        = "0x80026c98" # sltiu v0,t2,0x15
startcol_site     = "0x80026b20" # andi s5,v0,0x1f
startx_site       = "0x80026b10" # subu s6,zero,v0
stream_left_site  = "0x800272d0" # addiu a1,s1,-0x10
stream_right_site = "0x800272e4" # addiu a1,s1,0x150 (320+16)

# Controller: HARDCODED digital. X4 predates the DualShock (US Sept 1997 vs
# DualShock Nov 1997): its libpad never sends the 0x43 config probe and REJECTS
# pad id 0x73 — with an analog pad presented, the title screen ignores START
# entirely (verified via the SIO byte ring: buttons byte 0xF7 delivered, game
# ignores). Digital (id 0x41) is the ONLY pad type the game supports, so
# lock_mode hides the launcher's whole pad-mode selector (same pattern as
# Tomba 2) and forces every port to default_mode — there is no valid choice to
# offer. allow_hybrid=false is redundant under lock_mode but documents intent.
[controller]
default_mode   = "digital"
deadzone       = 12000
allow_hybrid   = false
lock_mode      = true

# ── Audit-specific config (consumed by psxrecomp tools/*.py and tests) ──
[audit]
# Dynamic discovery — functions are found by walking control flow from entry_pc.

# Code region: text segment is contiguous from load_address for text_size bytes.
[[audit.regions]]
name        = "Text"
rom_start   = "0x800"          # offset within the PS-X EXE file (skip header)
rom_end     = "0x120000"       # rom_start + text_size (0x800 + 0x11F800)
vaddr_base  = "0x80010000"

# Address normalization: KSEG masking only (game loads contiguously, no remaps).
[audit.normalize]
kseg_mask = "0x1FFFFFFF"
